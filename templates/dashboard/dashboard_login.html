<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login · BabyShop Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0e14;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
        }

        /* ── Glassmorphic background glow ── */
        body::before {
            content: '';
            position: fixed;
            top: -40%;
            left: -20%;
            width: 70%;
            height: 80%;
            background: radial-gradient(circle, rgba(251, 133, 0, 0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            right: -20%;
            width: 60%;
            height: 70%;
            background: radial-gradient(circle, rgba(255, 183, 3, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            width: 100%;
            max-width: 960px;
            min-height: 540px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 32px;
            overflow: hidden;
            box-shadow:
                0 40px 80px -12px rgba(0, 0, 0, 0.7),
                0 0 0 1px rgba(255, 255, 255, 0.06);
            transition: transform 0.3s ease;
        }

        /* ── Left visual ── */
        .login-visual {
            flex: 1.1;
            background: linear-gradient(145deg, #fb8500, #ffb703);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 40px;
            text-align: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .login-visual::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.20) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.08) 0%, transparent 40%);
            pointer-events: none;
        }

        .login-visual .brand-icon {
            position: relative;
            z-index: 1;
            width: 88px;
            height: 88px;
            background: rgba(255, 255, 255, 0.20);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.2rem;
            margin-bottom: 24px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .login-visual h2 {
            position: relative;
            z-index: 1;
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.10);
        }

        .login-visual p {
            position: relative;
            z-index: 1;
            opacity: 0.92;
            font-weight: 400;
            font-size: 0.95rem;
            max-width: 260px;
            line-height: 1.6;
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
        }

        .login-visual .deco-dots {
            position: absolute;
            z-index: 0;
            bottom: 20px;
            right: 20px;
            font-size: 4rem;
            opacity: 0.15;
            letter-spacing: 8px;
            color: #fff;
            pointer-events: none;
        }

        /* ── Right form ── */
        .login-form-side {
            flex: 1;
            padding: 52px 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .login-form-side .form-header {
            margin-bottom: 28px;
        }

        .login-brand {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: #0b0e14;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .login-brand span {
            background: linear-gradient(135deg, #fb8500, #ffb703);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-sub {
            color: #6b7280;
            font-size: 0.92rem;
            margin-top: 4px;
            font-weight: 400;
        }

        /* ── Form elements ── */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #4b5563;
            margin-bottom: 6px;
        }

        .input-group-custom {
            display: flex;
            align-items: center;
            background: #f3f4f6;
            border-radius: 12px;
            border: 1.5px solid transparent;
            transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
            overflow: hidden;
        }

        .input-group-custom:focus-within {
            border-color: #fb8500;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(251, 133, 0, 0.10);
        }

        .input-group-custom .input-icon {
            padding: 0 14px 0 16px;
            font-size: 1.1rem;
            color: #9ca3af;
            display: flex;
            align-items: center;
            transition: color 0.25s ease;
            line-height: 1;
        }

        .input-group-custom:focus-within .input-icon {
            color: #fb8500;
        }

        .input-group-custom input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px 16px 12px 0;
            font-size: 0.95rem;
            font-weight: 500;
            color: #0b0e14;
            outline: none;
            font-family: 'Inter', sans-serif;
            min-width: 0;
        }

        .input-group-custom input::placeholder {
            color: #b0b8c4;
            font-weight: 400;
            font-size: 0.9rem;
        }

        .input-group-custom .toggle-btn {
            padding: 0 14px 0 4px;
            background: transparent;
            border: none;
            font-size: 1.1rem;
            color: #9ca3af;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: color 0.2s ease;
            line-height: 1;
        }

        .input-group-custom .toggle-btn:hover {
            color: #4b5563;
        }

        /* ── Alert messages ── */
        .alert-custom {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.85rem;
            color: #991b1b;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
        }

        .alert-custom i {
            font-size: 1.1rem;
        }

        /* ── Button ── */
        .btn-signin {
            background: #0b0e14;
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 13px 20px;
            border: none;
            border-radius: 12px;
            width: 100%;
            margin-top: 8px;
            transition: background 0.25s ease, transform 0.15s ease, box-shadow 0.25s ease;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.01em;
            position: relative;
            overflow: hidden;
        }

        .btn-signin::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06), transparent);
            pointer-events: none;
        }

        .btn-signin:hover {
            background: #1a1f2a;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(11, 14, 20, 0.25);
        }

        .btn-signin:active {
            transform: translateY(0px);
        }

        .btn-signin i {
            margin-right: 8px;
        }

        /* ── Footer ── */
        .form-footer {
            margin-top: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #9ca3af;
        }

        .form-footer a {
            color: #4b5563;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .form-footer a:hover {
            color: #fb8500;
        }

        .form-footer .copyright {
            color: #b0b8c4;
            font-size: 0.75rem;
        }

        /* ── Responsive ── */
        @media (max-width: 820px) {
            .login-wrapper {
                flex-direction: column;
                max-width: 420px;
                min-height: auto;
                border-radius: 24px;
            }

            .login-visual {
                padding: 32px 24px;
                min-height: 180px;
            }

            .login-visual .brand-icon {
                width: 64px;
                height: 64px;
                font-size: 2.4rem;
                margin-bottom: 14px;
            }

            .login-visual h2 {
                font-size: 1.4rem;
            }

            .login-visual p {
                font-size: 0.85rem;
                max-width: 100%;
            }

            .login-visual .deco-dots {
                display: none;
            }

            .login-form-side {
                padding: 32px 24px;
            }

            .login-brand {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 440px) {
            .login-form-side {
                padding: 24px 18px;
            }

            .input-group-custom input {
                font-size: 0.9rem;
                padding: 10px 12px 10px 0;
            }

            .btn-signin {
                font-size: 0.9rem;
                padding: 12px 16px;
            }

            .form-footer {
                flex-direction: column;
                gap: 6px;
                align-items: flex-start;
            }
        }

        /* ── subtle animation ── */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-wrapper {
            animation: fadeSlideUp 0.6s ease both;
        }

        .login-visual .brand-icon {
            animation: fadeSlideUp 0.6s ease 0.1s both;
        }

        .login-visual h2 {
            animation: fadeSlideUp 0.6s ease 0.15s both;
        }

        .login-visual p {
            animation: fadeSlideUp 0.6s ease 0.2s both;
        }

        .login-form-side .form-header {
            animation: fadeSlideUp 0.6s ease 0.1s both;
        }

        .login-form-side .form-group {
            animation: fadeSlideUp 0.6s ease 0.2s both;
        }

        .login-form-side .btn-signin {
            animation: fadeSlideUp 0.6s ease 0.3s both;
        }

        .login-form-side .form-footer {
            animation: fadeSlideUp 0.6s ease 0.35s both;
        }

        /* ── Django messages override ── */
        .alert-danger {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>

    <div class="login-wrapper">

        <!-- Left visual panel -->
        <div class="login-visual">
            <div class="brand-icon">🍼</div>
            <h2>BabyShop Admin</h2>
            <p>Manage products, inventory &amp; orders — all from one sleek dashboard.</p>
            <div class="deco-dots">⋯</div>
        </div>

        <!-- Right login form -->
        <div class="login-form-side">

            <div class="form-header">
                <div class="login-brand">
                    <span>✦</span> Welcome back
                </div>
                <p class="login-sub">Sign in to access your admin panel</p>
            </div>

            <!-- Django messages -->
            {% if messages %}
            {% for message in messages %}
            <div class="alert-custom">
                <i class="bi bi-exclamation-triangle-fill"></i>
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="form-group">
                    <label for="usernameInput">Username</label>
                    <div class="input-group-custom">
                        <span class="input-icon"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" id="usernameInput" class="form-control-plaintext"
                            placeholder="Enter your username" required autofocus />
                    </div>
                </div>

                <div class="form-group">
                    <label for="passwordField">Password</label>
                    <div class="input-group-custom">
                        <span class="input-icon"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" id="passwordField" class="form-control-plaintext"
                            placeholder="Enter your password" required />
                        <button type="button" class="toggle-btn" id="togglePassword"
                            aria-label="Toggle password visibility">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-signin">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>
            </form>

            <div class="form-footer">
                <span class="copyright">BabyShop &copy; {% now "Y" %}</span>
                <a href="#">Forgot password?</a>
            </div>

        </div>

    </div>

    <script>
        (function () {
            const toggleBtn = document.getElementById('togglePassword');
            const passwordField = document.getElementById('passwordField');
            const icon = toggleBtn.querySelector('i');

            toggleBtn.addEventListener('click', function () {
                const isPassword = passwordField.type === 'password';
                passwordField.type = isPassword ? 'text' : 'password';
                icon.className = isPassword ? 'bi bi-eye-slash' : 'bi bi-eye';
            });
        })();
    </script>

</body>

</html>
