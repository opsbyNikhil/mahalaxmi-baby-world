{% extends 'dashboard/dashboard_base.html' %}

{% block page_title %}Delete Product{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm text-center">
            <div class="card-body p-5">
                <i class="bi bi-trash3 text-danger" style="font-size: 3rem;"></i>
                <h4 class="mt-3 mb-2">Confirm Deletion</h4>
                <p class="text-muted">
                    Are you sure you want to delete <strong>{{ product.name }}</strong>?<br>
                    This action cannot be undone.
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <a href="{% url 'dashboard_home' %}" class="btn btn-light">Cancel</a>
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash3"></i> Yes, Delete
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
