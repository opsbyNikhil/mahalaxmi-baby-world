<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">

        <a class="navbar-brand fw-bold fs-3" href="{% url 'home' %}">
            👶 Mahalaxmi Baby World
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">

                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{% url 'home' %}">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if '/products/' in request.path %}active{% endif %}"
                        href="{% url 'product_list' %}">All Products</a>
                </li>

                <!-- Categories Dropdown -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                        aria-expanded="false">
                        Categories
                    </a>
                    <ul class="dropdown-menu">
                        {% for cat in categories %}
                        <li>
                            <a class="dropdown-item" href="{% url 'category_products' cat.slug %}">
                                {{ cat.name }}
                            </a>
                        </li>
                        {% empty %}
                        <li><span class="dropdown-item disabled">No categories</span></li>
                        {% endfor %}
                    </ul>
                </li>

            </ul>

            <!-- Search Form -->
            <form class="d-flex me-3" action="{% url 'search' %}" method="get">
                <input class="form-control me-0" type="search" name="q" placeholder="Search Products">
                <button class="btn btn-outline-primary" type="submit">Search</button>
            </form>

            <!-- Cart Button -->
            <a href="{% url 'cart' %}" class="btn btn-warning position-relative">
                🛒 Cart
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-dark" id="cart-badge">
                    {{ cart_count|default:0 }}
                </span>
            </a>

        </div>
    </div>
</nav>
